<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Informasi Customer Periklanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              darkPanel: "#1e293b", // slate-800
              darkerPanel: "#0f172a", // slate-900
              cardBg: "#e2e8f0", // slate-200
              accent: "#475569", // slate-600
            },
          },
        },
      };
    </script>
    <style>
      /* Scrollbar kustom untuk tampilan gelap yang lebih bersih */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Transisi Modal */
      .modal-enter {
        opacity: 0;
        transform: scale(0.95);
      }
      .modal-enter-active {
        opacity: 1;
        transform: scale(1);
        transition: all 0.2s ease-out;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-slate-800 font-sans min-h-screen">
    <!-- Bilah Navigasi (Navbar) -->
    <nav class="bg-darkerPanel text-slate-200 p-4 shadow-lg sticky top-0 z-10">
      <div class="max-w-7xl mx-auto flex items-center justify-start">
        <h1 class="text-xl font-bold tracking-wide">
          <i class="fas fa-bullhorn mr-2"></i> Sistem Informasi Pelanggan
        </h1>
      </div>
    </nav>

    <!-- Konten Utama -->
    <main class="max-w-7xl mx-auto p-4 sm:p-6">
      <!-- Bagian Dashboard -->
      <section class="mb-8">
        <!-- <h2
          class="text-lg font-semibold text-slate-700 border-b-2 border-slate-300 pb-2 mb-4"
        >
          Dashboard Statistik
        </h2> -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Kartu Total Customer -->
          <div
            class="bg-cardBg p-6 rounded-lg shadow-sm border border-slate-300 flex items-center"
          >
            <div
              class="p-4 bg-slate-700 text-white rounded-full mr-4 shadow-inner"
            >
              <i class="fas fa-users text-2xl"></i>
            </div>
            <div>
              <p
                class="text-sm font-medium text-slate-600 uppercase tracking-wider"
              >
                Total Pelanggan
              </p>
              <p class="text-3xl font-bold text-slate-900" id="statTotal">0</p>
            </div>
          </div>

          <!-- Kartu Customer per Kota -->
          <div
            class="bg-cardBg p-5 rounded-lg shadow-sm border border-slate-300 h-48 flex flex-col"
          >
            <h3
              class="text-sm font-medium text-slate-600 uppercase tracking-wider mb-3"
            >
              <i class="fas fa-city mr-1"></i> Pelanggan per Kota
            </h3>
            <div class="overflow-y-auto flex-1 pr-2" id="statCity">
              <p class="text-slate-500 text-sm">Belum ada data...</p>
            </div>
          </div>

          <!-- Kartu Customer per Perusahaan -->
          <div
            class="bg-cardBg p-5 rounded-lg shadow-sm border border-slate-300 h-48 flex flex-col"
          >
            <h3
              class="text-sm font-medium text-slate-600 uppercase tracking-wider mb-3"
            >
              <i class="fas fa-building mr-1"></i> Pelanggan per Perusahaan
            </h3>
            <div class="overflow-y-auto flex-1 pr-2" id="statCompany">
              <p class="text-slate-500 text-sm">Belum ada data...</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Bagian Aksi & Peralatan -->
      <section
        class="mb-4 flex flex-col sm:flex-row justify-between items-end sm:items-center gap-4 bg-slate-200 p-3 rounded-lg border border-slate-300 shadow-sm"
      >
        <div class="flex gap-2 w-full sm:w-auto">
          <button
            type="button"
            onclick="bukaForm()"
            class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded shadow transition text-sm font-medium"
          >
            <i class="fas fa-plus mr-1"></i> Tambah Pelanggan
          </button>
          <button
            type="button"
            onclick="eksporData()"
            class="bg-accent hover:bg-slate-700 text-white px-4 py-2 rounded shadow transition text-sm font-medium"
          >
            <i class="fas fa-file-export mr-1"></i> Export .txt
          </button>
          <label
            class="bg-slate-500 hover:bg-slate-600 text-white px-4 py-2 rounded shadow transition text-sm font-medium cursor-pointer"
          >
            <i class="fas fa-file-import mr-1"></i> Import .txt
            <input
              type="file"
              id="importFile"
              accept=".txt"
              class="hidden"
              onchange="imporData(event)"
            />
          </label>
        </div>

        <div class="relative w-full sm:w-64">
          <input
            type="text"
            id="searchInput"
            placeholder="Cari data..."
            onkeyup="cariSekarang()"
            class="w-full bg-gray-50 border border-slate-400 text-slate-800 text-sm rounded-lg focus:ring-slate-500 focus:border-slate-500 block pl-10 p-2 shadow-inner"
          />
          <div
            class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500"
          >
            <i class="fas fa-search"></i>
          </div>
        </div>
      </section>

      <!-- Bagian Tabel Data -->
      <section
        class="bg-white rounded-lg shadow-md border border-slate-300 overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left text-slate-600">
            <thead class="text-xs text-slate-200 uppercase bg-darkPanel">
              <tr>
                <th scope="col" class="px-6 py-4">No</th>
                <th scope="col" class="px-6 py-4">Nama Pelanggan</th>
                <th scope="col" class="px-6 py-4">Perusahaan</th>
                <th scope="col" class="px-6 py-4">Kota</th>
                <th scope="col" class="px-6 py-4">Email</th>
                <th scope="col" class="px-6 py-4">No. HP</th>
                <th scope="col" class="px-6 py-4">Alamat</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- Data akan dimasukkan di sini secara dinamis -->
            </tbody>
          </table>
        </div>
        <div id="emptyState" class="hidden p-8 text-center text-slate-500">
          <i class="fas fa-box-open text-4xl mb-3 text-slate-300"></i>
          <p>Data pelanggan tidak ditemukan.</p>
        </div>
      </section>
    </main>

    <!-- Form Modal (Tambah Pelanggan) -->
    <div
      id="customerModal"
      class="fixed inset-0 bg-slate-900 bg-opacity-60 backdrop-blur-sm hidden justify-center items-center z-50"
    >
      <div
        class="bg-gray-100 rounded-lg shadow-2xl border border-slate-400 w-full max-w-xl mx-4 transform transition-all"
      >
        <div
          class="flex justify-between items-center p-4 border-b border-slate-300 bg-cardBg rounded-t-lg"
        >
          <h3 class="text-lg font-bold text-slate-800">
            <i class="fas fa-user-plus mr-2 text-slate-600"></i>Tambah Pelanggan
          </h3>
          <button
            type="button"
            onclick="tutupForm()"
            class="text-slate-500 hover:text-slate-800 transition"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>

        <!-- Notifikasi Sukses dalam Modal -->
        <div
          id="successAlert"
          class="hidden mx-4 mt-4 p-3 mb-2 text-sm text-green-800 rounded-lg bg-green-100 border border-green-200 text-center font-medium"
        >
          <i class="fas fa-check-circle mr-1"></i> Data berhasil ditambahkan!
        </div>

        <form id="customerForm" class="p-4 space-y-4" novalidate>
          <div>
            <label class="block mb-1 text-sm font-medium text-slate-700"
              >Nama Pelanggan <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="formNama"
              class="bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block mb-1 text-sm font-medium text-slate-700"
                >Perusahaan <span class="text-red-500">*</span></label
              >
              <div class="flex gap-1">
                <select
                  id="formPerusahaan"
                  class="flex-1 bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm"
                >
                  <option value="">Pilih Perusahaan</option>
                </select>
                <button
                  type="button"
                  onclick="tambahDataPT()"
                  class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 rounded border border-slate-300 transition"
                  title="Tambah Perusahaan Baru"
                >
                  <i class="fas fa-plus"></i>
                </button>
                <button
                  type="button"
                  onclick="hapusDataPT()"
                  class="bg-red-100 hover:bg-red-200 text-red-600 px-3 rounded border border-red-200 transition"
                  title="Hapus Perusahaan Terpilih"
                >
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block mb-1 text-sm font-medium text-slate-700"
                >Kota <span class="text-red-500">*</span></label
              >
              <div class="flex gap-1">
                <select
                  id="formKota"
                  class="flex-1 bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm"
                >
                  <option value="">Pilih Kota</option>
                </select>
                <button
                  type="button"
                  onclick="tambahDataKota()"
                  class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 rounded border border-slate-300 transition"
                  title="Tambah Kota Baru"
                >
                  <i class="fas fa-plus"></i>
                </button>
                <button
                  type="button"
                  onclick="hapusDataKota()"
                  class="bg-red-100 hover:bg-red-200 text-red-600 px-3 rounded border border-red-200 transition"
                  title="Hapus Kota Terpilih"
                >
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block mb-1 text-sm font-medium text-slate-700"
                >Email <span class="text-red-500">*</span></label
              >
              <input
                type="email"
                id="formEmail"
                class="bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm"
              />
            </div>
            <div>
              <label class="block mb-1 text-sm font-medium text-slate-700"
                >No. HP <span class="text-red-500">*</span></label
              >
              <input
                type="tel"
                id="formHp"
                class="bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm"
              />
            </div>
          </div>

          <div>
            <label class="block mb-1 text-sm font-medium text-slate-700"
              >Alamat <span class="text-red-500">*</span></label
            >
            <textarea
              id="formAlamat"
              rows="2"
              class="bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block w-full p-2 shadow-sm resize-none"
            ></textarea>
          </div>

          <div
            class="flex items-center justify-end space-x-3 border-t border-slate-300 pt-4 mt-2"
          >
            <button
              type="button"
              onclick="tutupForm()"
              class="text-slate-600 bg-slate-200 hover:bg-slate-300 focus:ring-4 focus:outline-none focus:ring-slate-200 rounded text-sm font-medium px-5 py-2.5 transition"
            >
              Batal
            </button>
            <button
              type="submit"
              class="text-white bg-slate-700 hover:bg-slate-800 focus:ring-4 focus:outline-none focus:ring-slate-300 rounded text-sm font-medium px-5 py-2.5 shadow transition"
            >
              Simpan Data
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Alert & Konfirmasi -->
    <div
      id="alertModal"
      class="fixed inset-0 bg-slate-900 bg-opacity-70 backdrop-blur-sm hidden justify-center items-center z-[70]"
    >
      <div
        class="bg-white rounded-lg shadow-xl border border-slate-300 w-full max-w-sm mx-4 overflow-hidden transform transition-all scale-95 opacity-0"
        id="alertBox"
      >
        <div
          class="p-4 border-b border-slate-200 bg-slate-50 flex items-center"
        >
          <i id="alertIcon" class="fas fa-info-circle text-slate-500 mr-2"></i>
          <h3 id="alertTitle" class="font-bold text-slate-800">Info</h3>
        </div>
        <div class="p-5">
          <p id="alertMessage" class="text-sm text-slate-600"></p>
        </div>
        <div
          class="p-3 bg-slate-50 flex justify-end space-x-2 border-t border-slate-200"
        >
          <button
            type="button"
            id="alertBtnCancel"
            class="hidden px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium rounded transition"
          >
            Batal
          </button>
          <button
            type="button"
            id="alertBtnOk"
            class="px-4 py-2 bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium rounded transition shadow"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <!-- Modal Prompt (Input Text) -->
    <div
      id="promptModal"
      class="fixed inset-0 bg-slate-900 bg-opacity-70 backdrop-blur-sm hidden justify-center items-center z-[60]"
    >
      <div
        class="bg-white rounded-lg shadow-xl border border-slate-300 w-full max-w-sm mx-4 overflow-hidden transform transition-all scale-95 opacity-0"
        id="promptBox"
      >
        <div
          class="p-4 border-b border-slate-200 bg-slate-50 flex items-center"
        >
          <i class="fas fa-edit text-slate-500 mr-2"></i>
          <h3 id="promptTitle" class="font-bold text-slate-800">Input Baru</h3>
        </div>
        <div class="p-5">
          <p id="promptMessage" class="text-sm text-slate-600 mb-3"></p>
          <input
            type="text"
            id="promptInput"
            class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-slate-500 focus:border-slate-500 p-2 shadow-sm outline-none"
          />
        </div>
        <div
          class="p-3 bg-slate-50 flex justify-end space-x-2 border-t border-slate-200"
        >
          <button
            type="button"
            id="promptBtnCancel"
            class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium rounded transition"
          >
            Batal
          </button>
          <button
            type="button"
            id="promptBtnOk"
            class="px-4 py-2 bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium rounded transition shadow"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <!-- Skrip Utama -->
    <script src="index.js"></script>
  </body>
</html>
